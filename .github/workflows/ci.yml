name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate canonical fixture
        run: node scripts/validate-perchance-export.js tests/fixtures/valid/canonical-valid.json

      - name: Run validator test suite
        run: python -m unittest tests/test-validate-perchance-export.py
