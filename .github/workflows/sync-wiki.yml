name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: .wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync wiki content
        run: |
          set -euo pipefail

          # Remove old wiki content (except .git)
          find .wiki -mindepth 1 -not -path '.wiki/.git' -not -path '.wiki/.git/*' -delete

          # Verify source exists and is non-empty
          if [ ! -d wiki ] || [ -z "$(ls -A wiki)" ]; then
            echo "::error::wiki/ directory is missing or empty"
            exit 1
          fi

          # Copy wiki source files into the wiki checkout
          cp -a wiki/. .wiki/

      - name: Push to wiki
        run: |
          cd .wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "Sync wiki from repo wiki/ folder (${GITHUB_SHA::7})"
            git push
          fi
